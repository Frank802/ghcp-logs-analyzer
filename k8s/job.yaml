apiVersion: v1
kind: Secret
metadata:
  name: ghcp-logs-analyzer
  # Apply this to the target app's namespace
  # namespace: <your-app-namespace>
type: Opaque
stringData:
  github-token: "YOUR_GITHUB_TOKEN"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ghcp-logs-analyzer
  # Apply this to the target app's namespace
  # namespace: <your-app-namespace>
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: ghcp-logs-analyzer
    spec:
      serviceAccountName: ghcp-logs-analyzer
      automountServiceAccountToken: true
      restartPolicy: Never
      containers:
        - name: analyzer
          image: flanaext.azurecr.io/ghcp-logs-analyzer:latest
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ghcp-logs-analyzer
                  key: github-token
            - name: GITHUB_TARGET_REPOSITORY
              value: "Frank802/ghcp-logs-analyzer"
            - name: LogSource
              value: "Kubernetes"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
